<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>







    <div class="calculadora">
        <h1>caculadora</h1>

        <input type="text" disabled placeholder="0" id="pantalla">

        <div class="caculadorabtons">



            <button onclick=limpiar()>C</button>
            <button onclick="bton('+')">+</button>
            <button onclick="bton('%')">%</button>
            <button onclick="bton('/')">/</button>
            <button onclick="bton('7')">7</button>
            <button onclick="bton('8')">8</button>
            <button onclick="bton('9')">9</button>
            <button onclick="bton('x')">x</button>
            <button onclick="bton('4')">4</button>
            <button onclick="bton('5')">5</button>
            <button onclick="bton('6')">6</button>
            <button onclick="bton('-')">-</button>
            <button onclick="bton('1')">1</button>
            <button onclick="bton('2')">2</button>
            <button onclick="bton('3')">3</button>
            <button onclick="bton('*')">*</button>
            <button onclick="bton('0')">0</button>
            <button onclick="bton('.')">-</button>
            <button onclick="resultado()">=</button>


        </div>




        <script src="caculadora_script.js"></script>















    </div>
