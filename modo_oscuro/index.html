<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=bedtime" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>modo oscuro🌑</title>
</head>

<body>




    <span class="material-symbols-outlined"> bedtime</span>







    <style>
        * {

            padding: 0;
            margin: 0;

        }



        body {

            display: flex;
            align-items: center;
            justify-content: center;
            height: 70vh;
            transition: 0.3s ease-in-out;
        }


        .dark {

            background-color: #434343;
            color: white;

        }


        span {


            cursor: pointer;

        }
    </style>



    <script>

        let body = document.querySelector("body")
        let bton = document.querySelector("span").addEventListener("click", () => {

            body.classList.toggle("dark");



        })

    </script>


</body>

</html>
