<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style/stilos.css">
    <title>Document</title>
</head>

<body>


    <head>
        <meta charset="UTF-8">
        <title>Mi Proyecto Web</title>
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>

        <header>
            <h1>Mi Sitio Web</h1>
            <nav>
                <a href="#inicio">Inicio</a>
                <a href="#servicios">Servicios</a>
                <a href="#contacto">Contacto</a>
            </nav>
        </header>

        <section id="inicio" class="hero">
            <div class="container-hero">
                <h2>Bienvenido 🚀</h2>
                <p>Este es un proyecto web completo con HTML, CSS y JS.</p>
                <button onclick="mostrarMensaje()">Haz clic</button>
            </div>

        </section>

        <section id="servicios" class="servicios">
            <h2>Servicios</h2>
            <div class="cards">
                <div class="card">Diseño Web</div>
                <div class="card">Desarrollo</div>
                <div class="card">SEO</div>
            </div>
        </section>

        <section id="contacto" class="contacto">
            <h2>Contacto</h2>
            <form id="formulario">
                <input type="text" placeholder="Nombre" required id="Nombre">
                <input type="email" placeholder="Correo" required id="email">
                <textarea placeholder="Mensaje"></textarea>
                <button type="submit">Enviar</button>
            </form>
        </section>

        <footer>
            <p>© 2026 Mi Proyecto</p>
        </footer>

        <script src="script.js"></script>
    </body>

</html>
</body>

</html>
